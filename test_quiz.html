<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test EDA — Ing. Informática UA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #181b25;
  --bg3: #1e2230;
  --bg4: #262b3a;
  --text: #e2e4ec;
  --text2: #9da3b4;
  --accent: #6c8cff;
  --accent2: #4a6aef;
  --correct: #34d399;
  --correct-bg: rgba(52,211,153,.1);
  --wrong: #f87171;
  --wrong-bg: rgba(248,113,113,.1);
  --gold: #fbbf24;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Grain overlay ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none; z-index:9999;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:3px; }

/* ── SCREENS ── */
.screen { display:none; animation: fadeIn .4s ease; }
.screen.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

/* ── HEADER ── */
header {
  text-align:center;
  padding: 48px 24px 24px;
}
header h1 {
  font-family:'DM Serif Display',serif;
  font-size: clamp(2rem,5vw,3.2rem);
  background: linear-gradient(135deg, var(--accent), #a78bfa, var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing: -0.02em;
}
header p {
  color:var(--text2);
  margin-top:8px;
  font-size:.95rem;
}

/* ── CONTAINER ── */
.container {
  max-width:900px;
  margin:0 auto;
  padding:0 20px 60px;
}

/* ── HOME: THEME CARDS ── */
.theme-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(260px,1fr));
  gap:16px;
  margin-top:32px;
}
.theme-card {
  background: var(--bg2);
  border:1px solid var(--bg4);
  border-radius: var(--radius);
  padding:20px 22px;
  cursor:pointer;
  transition: all .25s ease;
  position:relative;
  overflow:hidden;
}
.theme-card::before {
  content:'';
  position:absolute; top:0; left:0;
  width:4px; height:100%;
  background: var(--card-color);
  transition: width .3s ease;
}
.theme-card:hover {
  border-color: var(--card-color);
  transform: translateY(-3px);
  box-shadow: 0 8px 32px rgba(0,0,0,.3);
}
.theme-card:hover::before { width:6px; }
.theme-card h3 {
  font-size:1.05rem;
  font-weight:600;
  margin-bottom:6px;
  padding-left:8px;
}
.theme-card .meta {
  font-size:.82rem;
  color:var(--text2);
  padding-left:8px;
}
.theme-card .meta span {
  color: var(--card-color);
  font-weight:600;
}

/* ── CONFIG PANEL ── */
.config-panel {
  background: var(--bg2);
  border:1px solid var(--bg4);
  border-radius: var(--radius);
  padding:28px;
  margin-top:24px;
}
.config-panel h2 {
  font-family:'DM Serif Display',serif;
  font-size:1.5rem;
  margin-bottom:20px;
}
.config-row {
  display:flex;
  align-items:center;
  gap:16px;
  margin-bottom:16px;
  flex-wrap:wrap;
}
.config-row label {
  font-size:.9rem;
  color:var(--text2);
  min-width:140px;
}
.config-row select, .config-row input[type=number] {
  background:var(--bg3);
  border:1px solid var(--bg4);
  color:var(--text);
  padding:10px 14px;
  border-radius:8px;
  font-family:inherit;
  font-size:.9rem;
  outline:none;
  transition: border-color .2s;
}
.config-row select:focus, .config-row input:focus { border-color:var(--accent); }
.config-row input[type=number] { width:90px; }

.btn {
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:12px 28px;
  border:none;
  border-radius:8px;
  font-family:inherit;
  font-size:.95rem;
  font-weight:600;
  cursor:pointer;
  transition: all .2s ease;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color:#fff;
}
.btn-primary:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(108,140,255,.3); }
.btn-secondary {
  background: var(--bg3);
  color:var(--text);
  border:1px solid var(--bg4);
}
.btn-secondary:hover { border-color:var(--accent); }
.btn-sm { padding:8px 16px; font-size:.85rem; }

.btn-row {
  display:flex; gap:12px; margin-top:24px; flex-wrap:wrap;
}

/* ── QUIZ SCREEN ── */
.quiz-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
  flex-wrap:wrap;
  gap:12px;
}
.quiz-header .theme-tag {
  font-size:.8rem;
  padding:6px 14px;
  border-radius:20px;
  font-weight:600;
  color:#fff;
}
.quiz-progress {
  display:flex;
  align-items:center;
  gap:12px;
}
.progress-bar-outer {
  width:180px; height:6px;
  background:var(--bg4);
  border-radius:3px;
  overflow:hidden;
}
.progress-bar-inner {
  height:100%;
  background: linear-gradient(90deg, var(--accent), #a78bfa);
  border-radius:3px;
  transition: width .4s ease;
}
.progress-text {
  font-family:'JetBrains Mono',monospace;
  font-size:.82rem;
  color:var(--text2);
}

.question-card {
  background:var(--bg2);
  border:1px solid var(--bg4);
  border-radius:var(--radius);
  padding:32px;
  margin-bottom:20px;
  transition: border-color .3s;
}
.question-card.answered-correct { border-color: var(--correct); }
.question-card.answered-wrong { border-color: var(--wrong); }

.question-number {
  font-family:'JetBrains Mono',monospace;
  font-size:.78rem;
  color:var(--accent);
  margin-bottom:10px;
  letter-spacing:.05em;
}
.question-text {
  font-size:1.05rem;
  line-height:1.65;
  margin-bottom:24px;
  white-space: pre-wrap;
  word-break: break-word;
}

.options {
  display:flex;
  flex-direction:column;
  gap:10px;
}
.option-btn {
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 18px;
  background:var(--bg3);
  border:2px solid transparent;
  border-radius:10px;
  cursor:pointer;
  transition:all .2s ease;
  font-family:inherit;
  font-size:.95rem;
  color:var(--text);
  text-align:left;
  width:100%;
}
.option-btn:hover:not(.disabled) {
  border-color:var(--accent);
  background:rgba(108,140,255,.08);
}
.option-btn .indicator {
  width:22px; height:22px;
  border-radius:50%;
  border:2px solid var(--bg4);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  transition: all .2s;
  font-size:.75rem;
  font-weight:700;
}

.option-btn.selected .indicator {
  border-color:var(--accent);
  background:var(--accent);
  color:#fff;
}
.option-btn.correct-answer {
  border-color:var(--correct);
  background:var(--correct-bg);
}
.option-btn.correct-answer .indicator {
  border-color:var(--correct);
  background:var(--correct);
  color:#fff;
}
.option-btn.wrong-answer {
  border-color:var(--wrong);
  background:var(--wrong-bg);
}
.option-btn.wrong-answer .indicator {
  border-color:var(--wrong);
  background:var(--wrong);
  color:#fff;
}
.option-btn.disabled { cursor:default; opacity:.85; }

.nav-buttons {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
  flex-wrap: wrap;
  gap:12px;
}

/* ── QUESTION MAP ── */
.q-map-toggle {
  position:fixed;
  bottom:20px; right:20px;
  width:50px; height:50px;
  border-radius:50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border:none;
  color:#fff;
  font-size:1.3rem;
  cursor:pointer;
  z-index:100;
  box-shadow: 0 4px 16px rgba(108,140,255,.4);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .2s;
}
.q-map-toggle:hover { transform:scale(1.1); }

.q-map-panel {
  position:fixed;
  bottom:80px; right:20px;
  width:320px;
  max-height:400px;
  background:var(--bg2);
  border:1px solid var(--bg4);
  border-radius:var(--radius);
  padding:18px;
  z-index:100;
  box-shadow: var(--shadow);
  overflow-y:auto;
  display:none;
}
.q-map-panel.open { display:block; animation:fadeIn .3s ease; }
.q-map-panel h4 { margin-bottom:12px; font-size:.9rem; color:var(--text2); }
.q-map-grid {
  display:grid;
  grid-template-columns: repeat(8,1fr);
  gap:6px;
}
.q-map-cell {
  width:100%; aspect-ratio:1;
  border-radius:6px;
  border:none;
  font-family:'JetBrains Mono',monospace;
  font-size:.65rem;
  cursor:pointer;
  background:var(--bg4);
  color:var(--text2);
  transition: all .15s;
  display:flex;
  align-items:center;
  justify-content:center;
}
.q-map-cell:hover { background:var(--accent); color:#fff; }
.q-map-cell.current { outline:2px solid var(--accent); outline-offset:1px; }
.q-map-cell.map-correct { background:var(--correct); color:#fff; }
.q-map-cell.map-wrong { background:var(--wrong); color:#fff; }
.q-map-cell.map-unanswered { background:var(--bg4); }

/* ── RESULTS SCREEN ── */
.results-card {
  background:var(--bg2);
  border:1px solid var(--bg4);
  border-radius:var(--radius);
  padding:40px;
  text-align:center;
  margin-top:24px;
}
.score-circle {
  width:160px; height:160px;
  border-radius:50%;
  margin:0 auto 24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
}
.score-circle svg {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  transform:rotate(-90deg);
}
.score-circle circle {
  fill:none;
  stroke-width:6;
  stroke-linecap:round;
}
.score-circle .bg-ring { stroke:var(--bg4); }
.score-circle .fg-ring {
  stroke:var(--correct);
  stroke-dasharray:440;
  transition: stroke-dashoffset 1.5s ease;
}
.score-number {
  font-family:'DM Serif Display',serif;
  font-size:2.8rem;
  z-index:1;
  line-height:1;
}
.score-label { font-size:.85rem; color:var(--text2); z-index:1; }

.results-card h2 {
  font-family:'DM Serif Display',serif;
  font-size:1.8rem;
  margin-bottom:8px;
}
.results-stats {
  display:flex;
  justify-content:center;
  gap:32px;
  margin:24px 0;
  flex-wrap:wrap;
}
.stat {
  text-align:center;
}
.stat .val {
  font-family:'JetBrains Mono',monospace;
  font-size:1.4rem;
  font-weight:700;
}
.stat .lbl { font-size:.78rem; color:var(--text2); margin-top:2px; }

.review-list {
  text-align:left;
  margin-top:32px;
}
.review-item {
  background:var(--bg3);
  border-radius:10px;
  padding:18px 20px;
  margin-bottom:10px;
  border-left:4px solid var(--bg4);
}
.review-item.rev-correct { border-left-color:var(--correct); }
.review-item.rev-wrong { border-left-color:var(--wrong); }
.review-item.rev-skipped { border-left-color:var(--gold); }
.review-item .rev-header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}
.review-item .rev-qnum {
  font-family:'JetBrains Mono',monospace;
  font-size:.78rem;
  color:var(--accent);
}
.review-item .rev-badge {
  font-size:.72rem;
  padding:3px 10px;
  border-radius:10px;
  font-weight:600;
}
.rev-correct .rev-badge { background:var(--correct-bg); color:var(--correct); }
.rev-wrong .rev-badge { background:var(--wrong-bg); color:var(--wrong); }
.rev-skipped .rev-badge { background:rgba(251,191,36,.1); color:var(--gold); }
.review-item .rev-text {
  font-size:.9rem;
  line-height:1.5;
  color:var(--text2);
  margin-bottom:6px;
}
.review-item .rev-answer {
  font-size:.82rem;
  font-weight:600;
}

/* ── LOADING ── */
.loading {
  text-align:center;
  padding:80px 20px;
}
.spinner {
  width:40px; height:40px;
  border:3px solid var(--bg4);
  border-top-color:var(--accent);
  border-radius:50%;
  animation: spin .8s linear infinite;
  margin:0 auto 16px;
}
@keyframes spin { to{transform:rotate(360deg)} }

/* ── CHECKBOX THEMES ── */
.theme-checkboxes {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 8px;
  margin-bottom: 16px;
}
.theme-cb-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: .85rem;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 8px;
  background: var(--bg3);
  transition: background .2s;
}
.theme-cb-label:hover { background: var(--bg4); }
.theme-cb-label input { accent-color: var(--accent); width:16px; height:16px; }
.theme-cb-label .dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Range selector ── */
.range-panel {
  background: var(--bg3);
  border:1px solid var(--bg4);
  border-radius:10px;
  padding:16px 20px;
  margin-top:12px;
  margin-bottom:8px;
  animation: fadeIn .3s ease;
}
.range-header {
  font-size:.9rem;
  font-weight:600;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.range-icon { font-size:1.1rem; }
.range-inputs {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}
.range-inputs label {
  font-size:.85rem;
  color:var(--text2);
}
.range-input {
  background:var(--bg2);
  border:1px solid var(--bg4);
  color:var(--text);
  padding:8px 10px;
  border-radius:8px;
  font-family:'JetBrains Mono',monospace;
  font-size:.9rem;
  outline:none;
  width:70px;
  text-align:center;
  transition: border-color .2s;
}
.range-input:focus { border-color:var(--accent); }
.range-count {
  font-family:'JetBrains Mono',monospace;
  font-size:.82rem;
  color:var(--accent);
  margin-left:8px;
  padding:4px 10px;
  background:rgba(108,140,255,.1);
  border-radius:6px;
  white-space:nowrap;
}
.range-preview {
  margin-top:10px;
  font-size:.78rem;
  color:var(--text2);
  font-family:'JetBrains Mono',monospace;
  line-height:1.6;
  max-height:60px;
  overflow-y:auto;
}

/* ── Timer ── */
.timer-display {
  font-family:'JetBrains Mono',monospace;
  font-size:.9rem;
  color:var(--gold);
  padding:6px 14px;
  background:rgba(251,191,36,.08);
  border-radius:8px;
}

/* ── Mobile ── */
@media(max-width:600px) {
  .question-card { padding:20px; }
  .results-card { padding:24px; }
  .config-panel { padding:20px; }
  .q-map-panel { width:calc(100vw - 40px); right:10px; bottom:70px; }
  .quiz-header { flex-direction:column; align-items:flex-start; }
}
</style>
</head>
<body>

<!-- ═══════════ SCREEN: HOME ═══════════ -->
<div id="screen-home" class="screen active">
  <header>
    <h1>Test EDA</h1>
    <p>Estructuras de Datos y Algoritmos — Ing. Informática UA</p>
  </header>
  <div class="container">
    <div id="loading-home" class="loading">
      <div class="spinner"></div>
      <p style="color:var(--text2)">Cargando preguntas...</p>
    </div>
    <div id="home-content" style="display:none">
      <div class="theme-grid" id="theme-grid"></div>

      <div class="config-panel" style="margin-top:32px">
        <h2>⚙ Configurar Test</h2>

        <p style="font-size:.88rem;color:var(--text2);margin-bottom:16px">Selecciona los temas a incluir:</p>
        <div class="theme-checkboxes" id="theme-checkboxes"></div>

        <!-- Range selector: only visible when 1 theme selected -->
        <div class="range-panel" id="range-panel" style="display:none">
          <div class="range-header">
            <span class="range-icon">📌</span>
            <span>Filtrar por rango <small style="color:var(--text2)">(posición dentro del tema)</small></span>
          </div>
          <div class="range-inputs">
            <label>Desde la</label>
            <input type="number" id="cfg-range-from" class="range-input" min="1" value="1">
            <label>hasta la</label>
            <input type="number" id="cfg-range-to" class="range-input" min="1" value="1">
            <span class="range-count" id="range-count"></span>
          </div>
          <div class="range-preview" id="range-preview"></div>
        </div>

        <div class="config-row">
          <label>Nº de preguntas:</label>
          <select id="cfg-count">
            <option value="10">10</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="50">50</option>
            <option value="0">Todas las seleccionadas</option>
          </select>
        </div>
        <div class="config-row">
          <label>Orden:</label>
          <select id="cfg-order">
            <option value="random">Aleatorio</option>
            <option value="sequential">Secuencial</option>
          </select>
        </div>
        <div class="config-row">
          <label>Modo:</label>
          <select id="cfg-mode">
            <option value="practice">Práctica (ver respuesta al contestar)</option>
            <option value="exam">Examen (ver respuestas al final)</option>
          </select>
        </div>
        <div class="config-row">
          <label>Temporizador:</label>
          <select id="cfg-timer">
            <option value="0">Sin límite</option>
            <option value="30">30 seg/pregunta</option>
            <option value="60">1 min/pregunta</option>
            <option value="90">1.5 min/pregunta</option>
          </select>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="startQuiz()">▶ Comenzar Test</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════ SCREEN: QUIZ ═══════════ -->
<div id="screen-quiz" class="screen">
  <div class="container" style="padding-top:32px">
    <div class="quiz-header">
      <div>
        <span class="theme-tag" id="quiz-theme-tag"></span>
        <span id="timer-box" class="timer-display" style="margin-left:8px;display:none">--:--</span>
      </div>
      <div class="quiz-progress">
        <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar"></div></div>
        <span class="progress-text" id="progress-text"></span>
      </div>
    </div>
    <div id="question-area"></div>
    <div class="nav-buttons">
      <button class="btn btn-secondary btn-sm" onclick="prevQuestion()">← Anterior</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" onclick="exitQuiz()">✕ Salir</button>
        <button class="btn btn-primary btn-sm" id="btn-next" onclick="nextQuestion()">Siguiente →</button>
      </div>
    </div>
  </div>
  <button class="q-map-toggle" onclick="toggleMap()" title="Mapa de preguntas">☰</button>
  <div class="q-map-panel" id="q-map-panel">
    <h4>Mapa de preguntas</h4>
    <div class="q-map-grid" id="q-map-grid"></div>
  </div>
</div>

<!-- ═══════════ SCREEN: RESULTS ═══════════ -->
<div id="screen-results" class="screen">
  <header>
    <h1>Resultados</h1>
  </header>
  <div class="container">
    <div class="results-card" id="results-card"></div>
    <div class="btn-row" style="justify-content:center;margin-top:24px">
      <button class="btn btn-secondary" onclick="showScreen('home')">← Volver al inicio</button>
      <button class="btn btn-primary" onclick="retryWrong()">🔄 Reintentar falladas</button>
      <button class="btn btn-secondary" onclick="downloadLog('Descarga manual')">📄 Descargar log</button>
    </div>
    <div class="review-list" id="review-list"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════

// Reverse map: question number → theme
const qThemeMap = {};
for (const [theme, data] of Object.entries(THEMES)) {
  for (const qn of data.questions) qThemeMap[qn] = theme;
}

// ═══════════════════════════════════════════
//  PARSE QUESTIONS FROM TXT
// ═══════════════════════════════════════════
let allQuestions = {}; // qnum → {num, text, correct:'V'|'F'}

function parseQuestions(raw) {
  const lines = raw.split('\n');
  let current = null;
  let textLines = [];
  let inOptions = false;
  let correctNext = false;
  let hasCorrect = false;

  function saveQuestion() {
    if (current && textLines.length && hasCorrect) {
      allQuestions[current.num] = {
        num: current.num,
        text: textLines.join(' ').replace(/\s+/g,' ').trim(),
        correct: current.correct
      };
    }
  }

  for (let line of lines) {
    const trimmed = line.trim();

    // Detect new question: starts with number followed by period
    const qMatch = trimmed.match(/^(\d+)\.\s+(.+)/);
    if (qMatch) {
      saveQuestion();
      const num = parseInt(qMatch[1]);
      current = { num, correct: null };
      textLines = [qMatch[2]];
      inOptions = false;
      correctNext = false;
      hasCorrect = false;
      continue;
    }

    if (!current) continue;

    // Check for correct marker
    if (trimmed === '✓') {
      correctNext = true;
      continue;
    }
    if (trimmed === '○') {
      correctNext = false;
      continue;
    }

    if (trimmed === 'V' || trimmed === 'F') {
      if (correctNext) {
        current.correct = trimmed;
        hasCorrect = true;
      }
      correctNext = false;
      inOptions = true;
      continue;
    }

    // Continuation of question text
    if (!inOptions && trimmed.length > 0) {
      textLines.push(trimmed);
    }
  }
  saveQuestion();
}

// ═══════════════════════════════════════════
//  UI STATE
// ═══════════════════════════════════════════
let quizQuestions = []; // array of question objects for current quiz
let currentIdx = 0;
let answers = {};       // idx → 'V' | 'F'
let quizMode = 'practice';
let timerInterval = null;
let timerSeconds = 0;
let timePerQ = 0;
let totalElapsed = 0;
let quizStartTime = null;
let quizSelectedThemes = [];

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  if (name !== 'quiz') {
    clearInterval(timerInterval);
    document.getElementById('q-map-panel').classList.remove('open');
  }
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════
//  BUILD HOME SCREEN
// ═══════════════════════════════════════════
function buildHome() {
  const grid = document.getElementById('theme-grid');
  const cbs = document.getElementById('theme-checkboxes');
  grid.innerHTML = '';
  cbs.innerHTML = '';

  for (const [name, data] of Object.entries(THEMES)) {
    const available = data.questions.filter(q => allQuestions[q]);
    // Card
    const card = document.createElement('div');
    card.className = 'theme-card';
    card.style.setProperty('--card-color', data.color);
    card.innerHTML = `
      <h3>${name}</h3>
      <div class="meta"><span>${available.length}</span> preguntas</div>
    `;
    card.onclick = () => {
      // Uncheck all, check this one
      document.querySelectorAll('.theme-cb').forEach(cb => cb.checked = false);
      const cb = document.getElementById('cb-'+name);
      if(cb) cb.checked = true;
      document.getElementById('cfg-count').value = '0';
      onThemeCheckChange();
      // Scroll to config panel
      document.querySelector('.config-panel').scrollIntoView({behavior:'smooth', block:'start'});
    };
    grid.appendChild(card);

    // Checkbox
    const label = document.createElement('label');
    label.className = 'theme-cb-label';
    label.innerHTML = `
      <input type="checkbox" class="theme-cb" id="cb-${name}" checked onchange="onThemeCheckChange()">
      <span class="dot" style="background:${data.color}"></span>
      ${name} (${available.length})
    `;
    cbs.appendChild(label);
  }
}

// ═══════════════════════════════════════════
//  RANGE SELECTOR LOGIC
// ═══════════════════════════════════════════
let currentThemeQuestions = []; // sorted question numbers for selected theme

function onThemeCheckChange() {
  const selected = getSelectedThemes();
  const panel = document.getElementById('range-panel');

  if (selected.length === 1) {
    panel.style.display = 'block';
    populateRangeSelectors(selected[0]);
  } else {
    panel.style.display = 'none';
  }
}

function getSelectedThemes() {
  const selected = [];
  for (const name of Object.keys(THEMES)) {
    const cb = document.getElementById('cb-'+name);
    if (cb && cb.checked) selected.push(name);
  }
  return selected;
}

function populateRangeSelectors(themeName) {
  const data = THEMES[themeName];
  currentThemeQuestions = data.questions.filter(q => allQuestions[q]).sort((a,b) => a-b);
  const total = currentThemeQuestions.length;

  const fromInput = document.getElementById('cfg-range-from');
  const toInput = document.getElementById('cfg-range-to');

  fromInput.min = 1;
  fromInput.max = total;
  fromInput.value = 1;

  toInput.min = 1;
  toInput.max = total;
  toInput.value = total;

  fromInput.oninput = updateRangeCount;
  toInput.oninput = updateRangeCount;
  updateRangeCount();
}

function getRangeQuestions(themeName) {
  const data = THEMES[themeName];
  const available = data.questions.filter(q => allQuestions[q]).sort((a,b) => a-b);
  const total = available.length;

  let fromPos = parseInt(document.getElementById('cfg-range-from').value) || 1;
  let toPos = parseInt(document.getElementById('cfg-range-to').value) || total;

  // Clamp values
  fromPos = Math.max(1, Math.min(fromPos, total));
  toPos = Math.max(1, Math.min(toPos, total));

  // Ensure from <= to
  if (fromPos > toPos) [fromPos, toPos] = [toPos, fromPos];

  return available.slice(fromPos - 1, toPos);
}

function updateRangeCount() {
  const selected = getSelectedThemes();
  if (selected.length !== 1) return;

  const total = currentThemeQuestions.length;
  const fromInput = document.getElementById('cfg-range-from');
  const toInput = document.getElementById('cfg-range-to');

  // Clamp
  let fromPos = Math.max(1, Math.min(parseInt(fromInput.value)||1, total));
  let toPos = Math.max(1, Math.min(parseInt(toInput.value)||total, total));
  if (fromPos > toPos) [fromPos, toPos] = [toPos, fromPos];

  const count = toPos - fromPos + 1;
  document.getElementById('range-count').textContent = `${count} de ${total} preguntas`;

  // Preview: show which question numbers are included
  const slice = currentThemeQuestions.slice(fromPos - 1, toPos);
  const preview = document.getElementById('range-preview');
  if (slice.length <= 20) {
    preview.textContent = 'Pregs: ' + slice.join(', ');
  } else {
    preview.textContent = 'Pregs: ' + slice.slice(0,15).join(', ') + ' … ' + slice.slice(-3).join(', ');
  }
}

// ═══════════════════════════════════════════
//  START QUIZ
// ═══════════════════════════════════════════
function startQuiz() {
  // Gather selected themes
  const selected = getSelectedThemes();
  if (!selected.length) { alert('Selecciona al menos un tema'); return; }

  // Gather questions
  let pool = [];
  if (selected.length === 1) {
    // Use range filter if active
    const rangeNums = getRangeQuestions(selected[0]);
    for (const qn of rangeNums) {
      if (allQuestions[qn]) pool.push(allQuestions[qn]);
    }
  } else {
    for (const name of selected) {
      for (const qn of THEMES[name].questions) {
        if (allQuestions[qn]) pool.push(allQuestions[qn]);
      }
    }
  }
  if (!pool.length) { alert('No hay preguntas disponibles en ese rango'); return; }

  // Order
  const order = document.getElementById('cfg-order').value;
  if (order === 'random') pool.sort(() => Math.random() - 0.5);

  // Count
  let count = parseInt(document.getElementById('cfg-count').value);
  if (count > 0) pool = pool.slice(0, count);

  quizQuestions = pool;
  currentIdx = 0;
  answers = {};
  quizMode = document.getElementById('cfg-mode').value;
  timePerQ = parseInt(document.getElementById('cfg-timer').value);
  totalElapsed = 0;
  quizStartTime = new Date();
  quizSelectedThemes = selected;

  // Build map
  buildMap();

  showScreen('quiz');
  renderQuestion();
  startTimer();
}

// ═══════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════
function startTimer() {
  clearInterval(timerInterval);
  const box = document.getElementById('timer-box');
  if (!timePerQ) { box.style.display='none'; return; }
  box.style.display='inline';
  timerSeconds = timePerQ * quizQuestions.length;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    totalElapsed++;
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      finishQuiz();
    }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds/60);
  const s = timerSeconds%60;
  document.getElementById('timer-box').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ═══════════════════════════════════════════
//  RENDER QUESTION
// ═══════════════════════════════════════════
function renderQuestion() {
  const q = quizQuestions[currentIdx];
  const theme = qThemeMap[q.num] || 'Desconocido';
  const themeData = THEMES[theme] || {color:'#666'};

  // Header
  const tag = document.getElementById('quiz-theme-tag');
  tag.textContent = theme;
  tag.style.background = themeData.color;

  // Progress
  const pct = ((currentIdx+1)/quizQuestions.length*100);
  document.getElementById('progress-bar').style.width = pct+'%';
  document.getElementById('progress-text').textContent = `${currentIdx+1} / ${quizQuestions.length}`;

  // Question
  const area = document.getElementById('question-area');
  const answered = answers[currentIdx] !== undefined;
  const userAns = answers[currentIdx];

  let cardClass = 'question-card';
  if (answered && quizMode === 'practice') {
    cardClass += userAns === q.correct ? ' answered-correct' : ' answered-wrong';
  }

  area.innerHTML = `
    <div class="${cardClass}">
      <div class="question-number">PREGUNTA ${q.num}</div>
      <div class="question-text">${escapeHtml(q.text)}</div>
      <div class="options">
        ${renderOption('V','Verdadero', q, answered, userAns)}
        ${renderOption('F','Falso', q, answered, userAns)}
      </div>
    </div>
  `;

  // Next button
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = currentIdx === quizQuestions.length-1 ? 'Finalizar ✓' : 'Siguiente →';

  updateMap();
}

function renderOption(val, label, q, answered, userAns) {
  let cls = 'option-btn';
  let icon = '';
  const showResult = answered && quizMode === 'practice';

  if (showResult) {
    cls += ' disabled';
    if (val === q.correct) {
      cls += ' correct-answer';
      icon = '✓';
    } else if (val === userAns && val !== q.correct) {
      cls += ' wrong-answer';
      icon = '✕';
    }
  } else if (answered && val === userAns) {
    cls += ' selected';
    icon = '●';
  }

  const onclick = answered && quizMode === 'practice' ? '' : `onclick="selectAnswer('${val}')"`;
  return `<button class="${cls}" ${onclick}>
    <span class="indicator">${icon}</span>
    <span>${label}</span>
  </button>`;
}

function selectAnswer(val) {
  answers[currentIdx] = val;
  renderQuestion();
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function nextQuestion() {
  if (currentIdx < quizQuestions.length - 1) {
    currentIdx++;
    renderQuestion();
    window.scrollTo(0,0);
  } else {
    finishQuiz();
  }
}

function prevQuestion() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
    window.scrollTo(0,0);
  }
}

function goToQuestion(idx) {
  currentIdx = idx;
  renderQuestion();
  document.getElementById('q-map-panel').classList.remove('open');
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════
//  QUESTION MAP
// ═══════════════════════════════════════════
function buildMap() {
  const grid = document.getElementById('q-map-grid');
  grid.innerHTML = '';
  quizQuestions.forEach((q, i) => {
    const btn = document.createElement('button');
    btn.className = 'q-map-cell';
    btn.textContent = i+1;
    btn.onclick = () => goToQuestion(i);
    grid.appendChild(btn);
  });
}

function updateMap() {
  const cells = document.querySelectorAll('.q-map-cell');
  cells.forEach((cell, i) => {
    cell.className = 'q-map-cell';
    if (i === currentIdx) cell.classList.add('current');
    if (answers[i] !== undefined) {
      const q = quizQuestions[i];
      cell.classList.add(answers[i] === q.correct ? 'map-correct' : 'map-wrong');
    } else {
      cell.classList.add('map-unanswered');
    }
  });
}

function toggleMap() {
  document.getElementById('q-map-panel').classList.toggle('open');
}

// ═══════════════════════════════════════════
//  RESULTS
// ═══════════════════════════════════════════
function finishQuiz() {
  clearInterval(timerInterval);

  let correct = 0, wrong = 0, skipped = 0;
  quizQuestions.forEach((q, i) => {
    if (answers[i] === undefined) skipped++;
    else if (answers[i] === q.correct) correct++;
    else wrong++;
  });

  const total = quizQuestions.length;
  const pct = Math.round(correct/total*100);
  const circumference = 2 * Math.PI * 70;
  const offset = circumference - (pct/100)*circumference;

  let grade = '';
  if (pct >= 90) grade = '🏆 ¡Sobresaliente!';
  else if (pct >= 70) grade = '👏 ¡Notable!';
  else if (pct >= 50) grade = '📝 Aprobado';
  else grade = '📚 Necesitas repasar';

  const card = document.getElementById('results-card');
  card.innerHTML = `
    <div class="score-circle">
      <svg viewBox="0 0 160 160">
        <circle class="bg-ring" cx="80" cy="80" r="70"/>
        <circle class="fg-ring" cx="80" cy="80" r="70"
          style="stroke-dashoffset:${offset};stroke:${pct>=50?'var(--correct)':'var(--wrong)'}"/>
      </svg>
      <span class="score-number">${pct}%</span>
      <span class="score-label">${correct}/${total}</span>
    </div>
    <h2>${grade}</h2>
    <div class="results-stats">
      <div class="stat"><div class="val" style="color:var(--correct)">${correct}</div><div class="lbl">Correctas</div></div>
      <div class="stat"><div class="val" style="color:var(--wrong)">${wrong}</div><div class="lbl">Incorrectas</div></div>
      <div class="stat"><div class="val" style="color:var(--gold)">${skipped}</div><div class="lbl">Sin contestar</div></div>
    </div>
  `;

  // Review list
  const rl = document.getElementById('review-list');
  rl.innerHTML = '<h3 style="margin-bottom:16px;font-family:DM Serif Display,serif">Revisión de respuestas</h3>';

  quizQuestions.forEach((q, i) => {
    const ans = answers[i];
    let status, badge;
    if (ans === undefined) { status='rev-skipped'; badge='Sin contestar'; }
    else if (ans === q.correct) { status='rev-correct'; badge='Correcta'; }
    else { status='rev-wrong'; badge='Incorrecta'; }

    const ansText = ans === 'V' ? 'Verdadero' : ans === 'F' ? 'Falso' : '—';
    const correctText = q.correct === 'V' ? 'Verdadero' : 'Falso';

    rl.innerHTML += `
      <div class="review-item ${status}">
        <div class="rev-header">
          <span class="rev-qnum">Pregunta ${q.num} — ${qThemeMap[q.num]||''}</span>
          <span class="rev-badge">${badge}</span>
        </div>
        <div class="rev-text">${escapeHtml(q.text.substring(0,200))}${q.text.length>200?'…':''}</div>
        <div class="rev-answer">
          Tu respuesta: ${ansText} &nbsp;|&nbsp; Correcta: <span style="color:var(--correct)">${correctText}</span>
        </div>
      </div>
    `;
  });

  showScreen('results');

  // Auto-download log
  downloadLog('Test finalizado');
}

function retryWrong() {
  const wrongQs = quizQuestions.filter((q, i) => answers[i] !== undefined && answers[i] !== q.correct);
  if (!wrongQs.length) { alert('¡No tienes preguntas falladas!'); return; }

  quizQuestions = wrongQs;
  quizQuestions.sort(() => Math.random() - 0.5);
  currentIdx = 0;
  answers = {};
  buildMap();
  showScreen('quiz');
  renderQuestion();
  // No timer for retry
  document.getElementById('timer-box').style.display = 'none';
}

// ═══════════════════════════════════════════
//  LOG GENERATION
// ═══════════════════════════════════════════
function generateLog(reason) {
  if (!quizQuestions.length) return null;

  const now = new Date();
  const duration = quizStartTime ? Math.round((now - quizStartTime) / 1000) : 0;
  const durMin = Math.floor(duration / 60);
  const durSec = duration % 60;

  let correct = 0, wrong = 0, skipped = 0;
  const details = [];

  quizQuestions.forEach((q, i) => {
    const ans = answers[i];
    let status;
    if (ans === undefined) { skipped++; status = 'SIN CONTESTAR'; }
    else if (ans === q.correct) { correct++; status = 'CORRECTA'; }
    else { wrong++; status = 'INCORRECTA'; }

    const ansText = ans === 'V' ? 'Verdadero' : ans === 'F' ? 'Falso' : '—';
    const correctText = q.correct === 'V' ? 'Verdadero' : 'Falso';
    const theme = qThemeMap[q.num] || 'Desconocido';

    details.push({
      num: q.num,
      theme,
      status,
      userAns: ansText,
      correctAns: correctText,
      text: q.text.substring(0, 120) + (q.text.length > 120 ? '...' : '')
    });
  });

  const total = quizQuestions.length;
  const pct = total > 0 ? Math.round(correct / total * 100) : 0;

  // Theme breakdown
  const themeStats = {};
  quizQuestions.forEach((q, i) => {
    const theme = qThemeMap[q.num] || 'Desconocido';
    if (!themeStats[theme]) themeStats[theme] = { total: 0, correct: 0, wrong: 0, skipped: 0 };
    themeStats[theme].total++;
    const ans = answers[i];
    if (ans === undefined) themeStats[theme].skipped++;
    else if (ans === q.correct) themeStats[theme].correct++;
    else themeStats[theme].wrong++;
  });

  // Build TXT
  const sep = '═'.repeat(60);
  const sep2 = '─'.repeat(60);
  let log = '';

  log += sep + '\n';
  log += '  TEST EDA — REGISTRO DE RESULTADOS\n';
  log += sep + '\n\n';

  log += `Fecha:        ${now.toLocaleDateString('es-ES', {weekday:'long', year:'numeric', month:'long', day:'numeric'})}\n`;
  log += `Hora inicio:  ${quizStartTime ? quizStartTime.toLocaleTimeString('es-ES') : '—'}\n`;
  log += `Hora fin:     ${now.toLocaleTimeString('es-ES')}\n`;
  log += `Duración:     ${durMin}m ${durSec}s\n`;
  log += `Motivo fin:   ${reason}\n`;
  log += `Modo:         ${quizMode === 'practice' ? 'Práctica' : 'Examen'}\n`;
  log += `Temas:        ${quizSelectedThemes.join(', ')}\n`;

  log += '\n' + sep + '\n';
  log += '  RESUMEN\n';
  log += sep + '\n\n';

  log += `Total preguntas:    ${total}\n`;
  log += `Correctas:          ${correct}  (${pct}%)\n`;
  log += `Incorrectas:        ${wrong}  (${total > 0 ? Math.round(wrong/total*100) : 0}%)\n`;
  log += `Sin contestar:      ${skipped}  (${total > 0 ? Math.round(skipped/total*100) : 0}%)\n`;

  let grade = '';
  if (pct >= 90) grade = 'Sobresaliente';
  else if (pct >= 70) grade = 'Notable';
  else if (pct >= 50) grade = 'Aprobado';
  else grade = 'Suspenso';
  log += `Calificación:       ${grade}\n`;

  // Theme breakdown
  log += '\n' + sep + '\n';
  log += '  DESGLOSE POR TEMA\n';
  log += sep + '\n\n';

  for (const [theme, stats] of Object.entries(themeStats)) {
    const tPct = stats.total > 0 ? Math.round(stats.correct / stats.total * 100) : 0;
    log += `${theme}\n`;
    log += `  ${stats.correct}/${stats.total} correctas (${tPct}%)  |  ${stats.wrong} incorrectas  |  ${stats.skipped} sin contestar\n\n`;
  }

  // Detail
  log += sep + '\n';
  log += '  DETALLE DE PREGUNTAS\n';
  log += sep + '\n\n';

  // Wrong questions first
  const wrongDetails = details.filter(d => d.status === 'INCORRECTA');
  if (wrongDetails.length) {
    log += '── INCORRECTAS ──\n\n';
    wrongDetails.forEach(d => {
      log += `  [Preg. ${d.num}] ${d.theme}\n`;
      log += `  ${d.text}\n`;
      log += `  Tu respuesta: ${d.userAns}  |  Correcta: ${d.correctAns}\n\n`;
    });
  }

  const skippedDetails = details.filter(d => d.status === 'SIN CONTESTAR');
  if (skippedDetails.length) {
    log += '── SIN CONTESTAR ──\n\n';
    skippedDetails.forEach(d => {
      log += `  [Preg. ${d.num}] ${d.theme}\n`;
      log += `  ${d.text}\n`;
      log += `  Correcta: ${d.correctAns}\n\n`;
    });
  }

  const correctDetails = details.filter(d => d.status === 'CORRECTA');
  if (correctDetails.length) {
    log += '── CORRECTAS ──\n\n';
    correctDetails.forEach(d => {
      log += `  [Preg. ${d.num}] ${d.theme}\n`;
      log += `  ${d.text}\n\n`;
    });
  }

  log += sep + '\n';
  log += '  Fin del registro\n';
  log += sep + '\n';

  return log;
}

function downloadLog(reason) {
  const log = generateLog(reason);
  if (!log) return;

  const now = new Date();
  const dateStr = now.toISOString().slice(0,10);
  const timeStr = now.toTimeString().slice(0,5).replace(':','-');
  const filename = `test_eda_${dateStr}_${timeStr}.txt`;

  const blob = new Blob([log], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function exitQuiz() {
  if (quizQuestions.length && Object.keys(answers).length > 0) {
    downloadLog('Salida voluntaria (test no finalizado)');
  }
  showScreen('home');
}

// ═══════════════════════════════════════════
//  INIT: LOAD FILE
// ═══════════════════════════════════════════
async function init() {
  try {
    const resp = await fetch('preguntas_test.txt');
    if (!resp.ok) throw new Error('No se pudo cargar el archivo');
    const text = await resp.text();
    parseQuestions(text);

    document.getElementById('loading-home').style.display = 'none';
    document.getElementById('home-content').style.display = 'block';
    buildHome();
  } catch(e) {
    document.getElementById('loading-home').innerHTML = `
      <p style="color:var(--wrong)">❌ Error: ${e.message}</p>
      <p style="color:var(--text2);margin-top:8px">Asegúrate de que <code>preguntas_test.txt</code> está en el mismo directorio que este HTML.</p>
      <p style="color:var(--text2);margin-top:4px;font-size:.85rem">Nota: es necesario servir desde un servidor (no abrir directamente con file://). Usa: <code>python3 -m http.server</code></p>
    `;
  }
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (!document.getElementById('screen-quiz').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === 'Enter') nextQuestion();
  if (e.key === 'ArrowLeft') prevQuestion();
  if (e.key === 'v' || e.key === 'V' || e.key === '1') selectAnswer('V');
  if (e.key === 'f' || e.key === 'F' || e.key === '2') selectAnswer('F');
  if (e.key === 'm') toggleMap();
});

// Warn before closing tab if quiz in progress
window.addEventListener('beforeunload', e => {
  if (document.getElementById('screen-quiz').classList.contains('active') && Object.keys(answers).length > 0) {
    e.preventDefault();
    e.returnValue = '';
  }
});

init();
</script>
